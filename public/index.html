<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Hub</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <header class="topbar">
        <h1>🏆 Sports Hub</h1>
        <p class="tagline">Open-source scores &amp; stats, self-hosted in Docker.</p>
    </header>
    <main>
        <section id="scores">
            <h2>Today's Games</h2>
            <div id="scoreboard" class="scoreboard">
                <p class="loading">Loading scores...</p>
            </div>
        </section>
    </main>
    <footer>
        <p>Running in a container near you.</p>
    </footer>

    <script src="/app.js"></script>
</body>

</html>
