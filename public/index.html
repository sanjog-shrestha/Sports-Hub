<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Hub</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <header class="topbar">
        <h1>🏆 Sports Hub</h1>
        <p class="tagline">Open-source scores &amp; stats, self-hosted in Docker.</p>
    </header>
    <main>
        <section id="scores">
            <h2>Today's Games</h2>
            <div id="scoreboard" class="scoreboard">
                <p class="loading">Loading scores...</p>
            </div>
        </section>

        <section id="teams">
            <h2>Teams</h2>

            <input type="text" id="teamSearch" placeholder="Search teams, city or league..." />
            <div id="teamsList" class="teams-grid">
                <p class="loading">Loading teams....</p>
            </div>
        </section>

    </main>
    <footer>
        <p>Running in a container near you.</p>
    </footer>
    <div id="teamModal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="closeTeamModal()">×</button>
            <div id="teamDetails"></div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>

</html>
